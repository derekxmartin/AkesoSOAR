services:
  postgres:
    image: postgres:16
    container_name: akeso_soar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-akeso_soar}
      POSTGRES_USER: ${POSTGRES_USER:-akeso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akeso} -d ${POSTGRES_DB:-akeso_soar}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
